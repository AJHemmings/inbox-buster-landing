<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 220" width="1280" height="220">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#2A1860"/>
      <stop offset="100%" stop-color="#0F0A1E"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="220" fill="url(#bg)"/>

  <!-- Subtle centre glow -->
  <ellipse cx="640" cy="100" rx="500" ry="110" fill="#7C3AED" opacity="0.055"/>

  <!-- Ghost envelope — right -->
  <g transform="translate(1072, 48)" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.12">
    <rect width="136" height="100" rx="6"/>
    <polyline points="0,0 68,58 136,0"/>
  </g>

  <!-- Ghost envelope — left -->
  <g transform="translate(72, 62) rotate(-12 42 35)" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.08">
    <rect width="84" height="62" rx="4"/>
    <polyline points="0,0 42,36 84,0"/>
  </g>

  <!-- Wordmark -->
  <text
    x="640" y="120"
    text-anchor="middle"
    font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
    font-weight="900"
    font-size="70"
    letter-spacing="4">
    <tspan fill="#4ADE80">⚡ </tspan>
    <tspan fill="#FFFFFF">INBOX </tspan>
    <tspan fill="#4ADE80">BUSTER</tspan>
  </text>

  <!-- Tagline -->
  <text
    x="640" y="172"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="15"
    fill="#A78BFA"
    letter-spacing="3">
    YOUR INBOX IS A DISASTER. LET'S FIX THAT.
  </text>
</svg>
